name: Jalankan dan Tes GUI Autofill

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-gui-binary:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Perbaikan 1: Pastikan sistem macOS memiliki Tcl/Tk terinstal untuk menjalankan Tkinter
      - name: Install Tcl/Tk Graphics Library
        run: |
          brew install tcl-tk
          echo "TK_LIBRARY=$(brew --prefix tcl-tk)/lib" >> $GITHUB_ENV
          echo "TCL_LIBRARY=$(brew --prefix tcl-tk)/lib" >> $GITHUB_ENV

      - name: Ambil File Biner dari Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo ${{ github.repository }} --pattern "*.zip" --dir ./
          unzip -o *.zip
          rm *.zip

      # Perbaikan 2: Menangkap log error (stderr) agar kita tahu alasan pasti crash jika gagal
      - name: Jalankan Aplikasi GUI di Latar Belakang
        run: |
          chmod +x main_gui.app/Contents/MacOS/main_gui
          
          # Jalankan biner dan alihkan semua pesan error ke file app_error.log
          ./main_gui.app/Contents/MacOS/main_gui > app_output.log 2> app_error.log &
          APP_PID=$!
          
          sleep 12
          kill $APP_PID || true

      - name: Install Tool Ekstraksi PDF
        run: brew install poppler

      - name: Verifikasi Hasil Output PDF
        run: |
          # Perbaikan 3: Jika folder Output_Sample tidak ada, tampilkan isi log error untuk debugging
          if [ ! -d "Output_Sample" ] || [ ! "$(ls -A Output_Sample/*.pdf 2>/dev/null)" ]; then
            echo "=== LOG OUTPUT APLIKASI ==="
            cat app_output.log || true
            echo "=== LOG ERROR APLIKASI (Penyebab Crash) ==="
            cat app_error.log || true
            echo "==========================================="
            echo "Error: Aplikasi GUI crash atau gagal membuat file PDF!"
            exit 1
          fi
          
          FILE_PDF=$(ls Output_Sample/*.pdf | head -n 1)
          pdftotext "$FILE_PDF" teks_hasil.txt
          
          if grep -q "AL" teks_hasil.txt; then
            echo "Sukses: Aplikasi GUI berhasil melakukan autofill data ke PDF!"
          else
            echo "Error: Data dari Excel tidak ditemukan di dalam PDF!"
            cat teks_hasil.txt
            exit 1
          fi

      - name: Simpan Log dan PDF ke Artefak GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-dan-Log-GUI-Test
          path: |
            Output_Sample/
            app_error.log
            app_output.log
