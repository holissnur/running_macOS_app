name: Jalankan dan Tes GUI Autofill

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-gui-binary:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ambil File Biner dari Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo ${{ github.repository }} --pattern "*.zip" --dir ./
          unzip -o *.zip
          rm *.zip

      - name: Jalankan Aplikasi GUI di Latar Belakang
        run: |
          # 1. Berikan izin eksekusi biner
          chmod +x main_gui.app/Contents/MacOS/main_gui
          
          # 2. Jalankan aplikasi GUI secara background agar workflow tidak menggantung
          ./main_gui.app/Contents/MacOS/main_gui &
          
          # 3. Simpan ID Proses (PID) aplikasi
          APP_PID=$!
          
          # 4. Tunggu 10 detik agar sistem memberi waktu GUI memproses Excel & PDF
          sleep 10
          
          # 5. Matikan aplikasi secara aman setelah proses pengisian selesai
          kill $APP_PID || true

      - name: Install Tool Ekstraksi PDF
        run: brew install poppler

      - name: Verifikasi Hasil Output PDF
        run: |
          # 6. Pastikan folder Output_Sample terbuat dan tidak kosong
          if [ ! -d "Output_Sample" ] || [ ! "$(ls -A Output_Sample/*.pdf 2>/dev/null)" ]; then
            echo "Error: Aplikasi GUI crash atau gagal membuat file PDF!"
            exit 1
          fi
          
          # 7. Ekstrak teks dari PDF hasil untuk validasi data
          FILE_PDF=$(ls Output_Sample/*.pdf | head -n 1)
          pdftotext "$FILE_PDF" teks_hasil.txt
          
          # 8. Validasi kata kunci sampel (Ganti "Budi" sesuai data Excel Anda)
          if grep -q "AL" teks_hasil.txt; then
            echo "Sukses: Aplikasi GUI berhasil melakukan autofill data ke PDF!"
          else
            echo "Error: Data dari Excel tidak ditemukan di dalam PDF!"
            cat teks_hasil.txt
            exit 1
          fi

      - name: Simpan PDF Hasil ke Artefak GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-PDF-GUI-Test
          path: Output_Sample/
