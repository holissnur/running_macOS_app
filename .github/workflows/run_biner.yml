name: Jalankan dan Tes GUI Autofill

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-gui-binary:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tcl/Tk Graphics Library
        run: |
          brew install tcl-tk
          echo "TK_LIBRARY=$(brew --prefix tcl-tk)/lib" >> $GITHUB_ENV
          echo "TCL_LIBRARY=$(brew --prefix tcl-tk)/lib" >> $GITHUB_ENV

      - name: Ambil File Biner dari Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo ${{ github.repository }} --pattern "*.zip" --dir ./
          unzip -o *.zip
          rm *.zip

      - name: Jalankan Aplikasi GUI Menggunakan macOS Launch Services
        run: |
          # 1. Berikan izin eksekusi penuh pada paket biner internal
          chmod +x main_gui.app/Contents/MacOS/main_gui
          
          # 2. Buka aplikasi menggunakan perintah 'open' macOS agar lolos blokir WindowServer
          open main_gui.app
          
          # 3. Tunggu 15 detik untuk memberi waktu aplikasi membaca Excel & membuat PDF
          echo "Menunggu aplikasi GUI memproses data..."
          sleep 15

      - name: Install Tool Ekstraksi PDF
        run: brew install poppler

      - name: Verifikasi Hasil Output PDF
        run: |
          # 4. Ambil log sistem dari Console macOS jika aplikasi ternyata menutup sendiri
          echo "=== MEMBACA LOG HISTORI SYSTEM (Jika ada crash) ==="
          log show --predicate 'process == "main_gui"' --last 1m || true
          echo "=================================================="

          # 5. Pastikan folder Output_Sample terbuat dan tidak kosong
          if [ ! -d "Output_Sample" ] || [ ! "$(ls -A Output_Sample/*.pdf 2>/dev/null)" ]; then
            echo "Error: Folder Output_Sample tidak ditemukan atau aplikasi gagal mengekstrak PDF!"
            exit 1
          fi
          
          # 6. Ekstrak teks dari PDF hasil untuk validasi data
          FILE_PDF=$(ls Output_Sample/*.pdf | head -n 1)
          pdftotext "$FILE_PDF" teks_hasil.txt
          
          # 7. Validasi kata kunci sampel (Ganti "Budi" sesuai data Excel Anda)
          if grep -q "AL" teks_hasil.txt; then
            echo "Sukses: Aplikasi GUI berhasil melakukan autofill data ke PDF!"
          else
            echo "Error: Data dari Excel tidak ditemukan di dalam PDF!"
            cat teks_hasil.txt
            exit 1
          fi

      - name: Simpan PDF Hasil ke Artefak GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-PDF-GUI-Test
          path: Output_Sample/
