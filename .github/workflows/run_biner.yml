name: Jalankan dan Tes Biner Autofill

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Membuat tombol manual di halaman GitHub Actions

jobs:
  test-binary:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ambil File Biner dari Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mengunduh biner .app dari release terbaru (latest)
          gh release download --repo ${{ github.repository }} --pattern "*.zip" --dir ./dist
          cd dist
          unzip *.zip

      - name: Jalankan Aplikasi Autofill
        run: |
          # Beri izin eksekusi pada binary di dalam .app
          # Ganti 'NamaAplikasi' dengan nama asli aplikasi Anda
          chmod +x dist/main_gui.app/Contents/MacOS/main_gui
          
          # Jalankan aplikasi. Pastikan file Excel input sudah ada di repositori Anda
          ./dist/main_gui.app/Contents/MacOS/main_gui

      - name: Install Tool Ekstraksi PDF
        run: brew install poppler

      - name: Verifikasi Isi PDF vs Excel
        run: |
          # 1. Pastikan file output PDF terbentuk
          if [ ! -f "Output_Sample/Hasil_Autofill.pdf" ]; then
            echo "Error: File PDF tidak ditemukan di folder Output_Sample!"
            exit 1
          fi
          
          # 2. Ekstrak teks dari PDF ke file teks
          pdftotext Output_Sample/Hasil_Autofill.pdf teks_hasil.txt
          
          # 3. Validasi kata kunci sampel yang harusnya ada di Excel (misal: "Budi")
          if grep -q "AL" teks_hasil.txt; then
            echo "Sukses: Data Excel terbukti masuk ke dalam PDF!"
          else
            echo "Error: Data Excel gagal masuk ke dalam PDF!"
            cat teks_hasil.txt
            exit 1
          fi

      - name: Simpan PDF Hasil ke Artefak
        if: always() # Tetap unggah meskipun tes di atas gagal untuk bahan analisa
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-PDF-Test
          path: Output_Sample/
