name: Jalankan dan Tes GUI Autofill

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-gui-binary:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tcl/Tk Graphics Library
        run: |
          brew install tcl-tk
          echo "TK_LIBRARY=$(brew --prefix tcl-tk)/lib" >> $GITHUB_ENV
          echo "TCL_LIBRARY=$(brew --prefix tcl-tk)/lib" >> $GITHUB_ENV

      - name: Ambil File Biner dari Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo ${{ github.repository }} --pattern "*.zip" --dir ./
          unzip -o *.zip
          rm *.zip

      - name: Jalankan Biner Secara Langsung Lewat Jalur Relatif
        run: |
          # 1. Berikan izin eksekusi penuh pada biner internal paket
          chmod +x main_gui.app/Contents/MacOS/main_gui
          
          # 2. Buat folder output secara lokal di repositori
          mkdir -p Output_Sample
          chmod 777 Output_Sample
          
          # 3. Jalankan biner eksekusi utama SECARA LANGSUNG (Tanpa perintah 'open')
          # Trik ini memaksa Python menggunakan folder repositori sebagai working directory utamanya.
          # Ditambahkan '&' di akhir agar runner tidak menggantung pada jendela Tkinter.
          ./main_gui.app/Contents/MacOS/main_gui > app_stdout.log 2> app_stderr.log &
          APP_PID=$!
          
          # 4. Beri waktu aplikasi memproses data Excel ke PDF
          echo "Menunggu biner memproses otomatisasi file..."
          sleep 15
          
          # 5. Matikan paksa proses agar tidak mengunci alur kerja GitHub
          kill $APP_PID || true

      - name: Install Tool Ekstraksi PDF
        run: brew install poppler

      - name: Verifikasi Hasil Output PDF
        run: |
          # 6. Cetak log error internal python jika terjadi crash di level kode
          echo "=== LOG OUTPUT PYTHON STDOUT ==="
          cat app_stdout.log || true
          echo "=== LOG ERROR PYTHON STDERR (Penyebab Utama) ==="
          cat app_stderr.log || true
          echo "================================================="

          # 7. Validasi keberadaan file PDF hasil eksekusi biner
          if [ ! -d "Output_Sample" ] || [ ! "$(ls -A Output_Sample/*.pdf 2>/dev/null)" ]; then
            echo "Error: Folder Output_Sample kosong atau biner gagal memproses file!"
            exit 1
          fi
          
          # 8. Ekstrak teks dari PDF hasil untuk validasi isi konten
          FILE_PDF=$(ls Output_Sample/*.pdf | head -n 1)
          pdftotext "$FILE_PDF" teks_hasil.txt
          
          # 9. Validasi kata kunci sampel (Ganti "Budi" sesuai data Excel Anda)
          if grep -q "AL" teks_hasil.txt; then
            echo "Sukses: Aplikasi GUI berhasil melakukan autofill data ke PDF!"
          else
            echo "Error: Data dari Excel tidak ditemukan di dalam PDF!"
            cat teks_hasil.txt
            exit 1
          fi

      - name: Simpan PDF Hasil ke Artefak GitHub
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-PDF-GUI-Test
          path: |
            Output_Sample/
            app_stdout.log
            app_stderr.log
